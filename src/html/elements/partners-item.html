<div class="partners__item" data-index="@@index">
  <div class="over"></div>
  <div class="partners__item-cover">
    <img src="@@img" alt="">
  </div>
  <div class="partners__item-body">
    <div class="partners__item-content">
      <div class="partners__item-title h5">
        @@title
      </div>
      <div class="partners__item-wrap">
        <div class="partners__item-suptitle">
          <p>
            Выполненные работы:
          </p>
        </div>
        <div class="partners__item-tags">
          <p>
            <span>Шпунтовое ограждение сваи БНС,</span>
            <span>Нагельное крепление,</span>
            <span>Монтажные работы по креплению коммуникаций в пятне котлована</span>
          </p>
        </div>
      </div>
      <div class="partners__item-year">
        <span>@@year</span> год
      </div>
    </div>
    <a class="partners__item-link" href="@@reviews-link" data-fancybox>
      Смотреть отзыв
    </a>
  </div>
</div>
