<!DOCTYPE html>
<html lang="ru" class="page__inner">
@@include('blocks/head.html', {"title": "Основа"})

<body>
  <div class="wrapper">
    <!-- Шапка -->
    @@include('./blocks/header.html')
    <!-- Секции страницы -->
    <main id="main" class="main">

      <section class="template">
        <div class="container">
          <div class="template__inner">

            <div class="breadcrumbs">
              <div class="breadcrumbs__inner">
                <ul>
                  <li>
                    <a href="/Osnova">
                      Главная
                    </a>
                  </li>
                  <li>
                    Каталог объектов
                  </li>
                </ul>
              </div>
            </div>

            <div class="general__head">
              <div class="general__head-title" data-title="split">
                <h3>
                  Каталог объектов
                </h3>
              </div>
            </div>

          </div>
        </div>
      </section>

      <section class="catalog">
        <div class="container">
          <form class="catalog__inner">

            <div class="catalog__head">
              <div class="filter">
                <div class="filter__wrap">
                  <div class="dropdown">
                    <div class="dropdown-btn">
                      <input class="dropdown-input dropdown-input--js" type="hidden" value="">
                      <label class="dropdown-label dropdown-label--js">Выбрать вид работы</label>
                      <i class="icon-chevron-min"></i>
                    </div>
                    <div class="dropdown-content">
                      <div class="dropdown-item">
                        <input id="radio_1" class="dropdown-radio" name="radio_1" type="radio" value="Вид работы 1">
                        <label for="radio_1" class="dropdown-label">Вид работы 1</label>
                      </div>
                      <div class="dropdown-item">
                        <input id="radio_2" class="dropdown-radio" name="radio_2" type="radio" value="Вид работы 2">
                        <label for="radio_2" class="dropdown-label">Вид работы 2</label>
                      </div>
                      <div class="dropdown-item">
                        <input id="radio_3" class="dropdown-radio" name="radio_3" type="radio" value="Вид работы 3">
                        <label for="radio_3" class="dropdown-label">Вид работы 3</label>
                      </div>
                    </div>
                  </div>
                  <div class="dropdown">
                    <div class="dropdown-btn">
                      <input class="dropdown-input dropdown-input--js" type="hidden" value="">
                      <label class="dropdown-label dropdown-label--js">Выбрать город</label>
                      <i class="icon-chevron-min"></i>
                    </div>
                    <div class="dropdown-content">
                      <div class="dropdown-item">
                        <input id="radio_4" class="dropdown-radio" name="radio_4" type="radio" value="Москва">
                        <label for="radio_4" class="dropdown-label">Москва</label>
                      </div>
                      <div class="dropdown-item">
                        <input id="radio_5" class="dropdown-radio" name="radio_5" type="radio" value="Новосибирск">
                        <label for="radio_5" class="dropdown-label">Новосибирск</label>
                      </div>
                      <div class="dropdown-item">
                        <input id="radio_6" class="dropdown-radio" name="radio_6" type="radio" value="Санкт-Петербург">
                        <label for="radio_6" class="dropdown-label">Санкт-Петербург</label>
                      </div>
                    </div>
                  </div>
                  <div class="dropdown">
                    <div class="dropdown-btn">
                      <input class="dropdown-input dropdown-input--js" type="hidden" value="">
                      <label class="dropdown-label dropdown-label--js">Район города</label>
                      <i class="icon-chevron-min"></i>
                    </div>
                    <div class="dropdown-content">
                      <div class="dropdown-item">
                        <input id="radio_7" class="dropdown-radio" name="radio_7" type="radio" value="Район 1">
                        <label for="radio_7" class="dropdown-label">Район 1</label>
                      </div>
                      <div class="dropdown-item">
                        <input id="radio_8" class="dropdown-radio" name="radio_8" type="radio" value="Район 2">
                        <label for="radio_8" class="dropdown-label">Район 2</label>
                      </div>
                      <div class="dropdown-item">
                        <input id="radio_9" class="dropdown-radio" name="radio_9" type="radio" value="Район 3">
                        <label for="radio_9" class="dropdown-label">Район 3</label>
                      </div>
                    </div>
                  </div>
                </div>

                <a class="filter__download" href="/" download="#">
                  <i class="icon-download-arrow"></i>
                  <p>
                    Скачать референс-лист
                  </p>
                </a>
              </div>
            </div>

            <div class="catalog__items">
              @@loop('./elements/catalog-item.html', './data/catalog-items.json')
            </div>

          </form>
        </div>
      </section>

    </main>
    <!-- Подвал -->
    @@include('blocks/footer.html')
